      const compressImageFile = (file, maxDimension = 1000, quality = 0.55) => {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = (e) => {
            const img = new Image();
            img.onload = () => {
              let { width, height } = img;
              if (width > height && width > maxDimension) {
                height = Math.round((height * maxDimension) / width);
                width = maxDimension;
              } else if (height > maxDimension) {
                width = Math.round((width * maxDimension) / height);
                height = maxDimension;
              }
              const canvas = document.createElement('canvas');
              canvas.width = width;
              canvas.height = height;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, width, height);
              const compressedDataUrl = canvas.toDataURL('image/jpeg', quality);
              resolve(compressedDataUrl);
            };
            img.onerror = () => reject(new Error('Gagal memuat gambar.'));
            img.src = e.target.result;
          };
          reader.onerror = () => reject(new Error('Gagal membaca file.'));
          reader.readAsDataURL(file);
        });
      };

                                <div className="flex flex-wrap gap-2">
                                  {item.photos[cat.key].map((photo, idx) => (
                                    <div key={idx} className="relative w-16 h-16 rounded-lg overflow-hidden border border-slate-200">
                                      <img src={photo} className="w-full h-full object-cover" />
                                      <button 
                                        onClick={() => handleDeletePhotoFromHistoryItem(item, cat.key, idx)}
                                        className="absolute top-0.5 right-0.5 bg-rose-600 text-white rounded-full w-4 h-4 flex items-center justify-center text-xs shadow"
                                      >
                                        <i data-lucide="x" className="w-2.5 h-2.5"></i>
                                      </button>
                                    </div>
                                  ))}
                                </div>
                              </div>
                            )
                          ))}
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              </div>
            )}

          </main>

          {/* Bottom Tabs Navigation */}
          <nav className="fixed bottom-0 left-0 right-0 bg-white border-t border-slate-200 shadow-lg px-4 py-2 z-30 flex justify-around items-center max-w-4xl mx-auto overflow-x-auto">
            <button onClick={() => setActiveTab('dashboard')} className={`flex flex-col items-center space-y-1 py-1 px-3 rounded-xl ${activeTab === 'dashboard' ? 'text-purple-800 bg-purple-50 font-bold' : 'text-slate-400'}`}>
              <i data-lucide="trending-up" className="w-5 h-5"></i>
              <span className="text-[10px]">Dasbor</span>
            </button>
            <button onClick={() => setActiveTab('sales')} className={`flex flex-col items-center space-y-1 py-1 px-3 rounded-xl ${activeTab === 'sales' ? 'text-purple-800 bg-purple-50 font-bold' : 'text-slate-400'}`}>
              <i data-lucide="circle-plus" className="w-5 h-5"></i>
              <span className="text-[10px]">Input</span>
            </button>
            <button onClick={() => setActiveTab('inventory')} className={`flex flex-col items-center space-y-1 py-1 px-3 rounded-xl ${activeTab === 'inventory' ? 'text-purple-800 bg-purple-50 font-bold' : 'text-slate-400'}`}>
              <i data-lucide="package" className="w-5 h-5"></i>
              <span className="text-[10px]">SO Stok</span>
            </button>
            <button onClick={() => setActiveTab('checklist')} className={`flex flex-col items-center space-y-1 py-1 px-3 rounded-xl ${activeTab === 'checklist' ? 'text-purple-800 bg-purple-50 font-bold' : 'text-slate-400'}`}>
              <i data-lucide="clipboard-check" className="w-5 h-5"></i>
              <span className="text-[10px]">Closing</span>
            </button>
            <button onClick={() => setActiveTab('photos')} className={`flex flex-col items-center space-y-1 py-1 px-3 rounded-xl ${activeTab === 'photos' ? 'text-purple-800 bg-purple-50 font-bold' : 'text-slate-400'}`}>
              <i data-lucide="camera" className="w-5 h-5"></i>
              <span className="text-[10px]">Foto</span>
            </button>
            <button onClick={() => setActiveTab('history')} className={`flex flex-col items-center space-y-1 py-1 px-3 rounded-xl ${activeTab === 'history' ? 'text-purple-800 bg-purple-50 font-bold' : 'text-slate-400'}`}>
              <i data-lucide="history" className="w-5 h-5"></i>
              <span className="text-[10px]">Riwayat ({historyList.length})</span>
            </button>
          </nav>

        </div>
      );
    }

    // Render App
    const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);

  </script>
</body>
</html>
